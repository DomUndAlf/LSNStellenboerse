stages:
  - docker

docker_build_frontend:
  stage: docker
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "$CI_JOB_TOKEN" | docker login -u gitlab-ci-token --password-stdin gitlab.dit.htwk-leipzig.de:5050
    - cd Source/DCNMJobPortal/Frontend
    - docker build --no-cache --build-arg PERSONAL_ACCESS_TOKEN=$PERSONAL_CI_TOKEN_LW -t gitlab.dit.htwk-leipzig.de:5050/softwareprojekt/stellenboerse:frontend . 
    - docker push gitlab.dit.htwk-leipzig.de:5050/softwareprojekt/stellenboerse:frontend
  rules:
   - if: $CI_COMMIT_BRANCH == "release"
  tags:
    - image

