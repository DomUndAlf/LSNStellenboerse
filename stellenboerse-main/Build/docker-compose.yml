version: '3.8'

services:
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cert.pem:/etc/cert.pem:ro
      - ./key.pem:/etc/key.pem:ro
    ports:
      - "80:80"
    depends_on:
      database_handler:
        condition: service_healthy
      web_agent:
        condition: service_started
      ai_service:
        condition: service_started
      validation:
        condition: service_started
      mysql:
        condition: service_healthy
      frontend:
        condition: service_started
      validation_website:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: gitlab.dit.htwk-leipzig.de:5050/softwareprojekt/stellenboerse:frontend
    ports:
      - "3000" 
    env_file:
      - .env
    depends_on:
      database_handler:
        condition: service_healthy

  database_handler:
    image: gitlab.dit.htwk-leipzig.de:5050/softwareprojekt/stellenboerse:database_handler
    ports: 
      - "4010" 
    env_file: 
      - .env
    environment:
      - DB_HOST=mysql
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4010/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 50s

  validation:
    image: gitlab.dit.htwk-leipzig.de:5050/softwareprojekt/stellenboerse:validation
    ports: 
      - "4020" 
    env_file: 
      - .env
    depends_on:
      database_handler:
        condition: service_healthy
     
  web_agent:
    image: gitlab.dit.htwk-leipzig.de:5050/softwareprojekt/stellenboerse:web_agent
    ports: 
      - "4030"
    env_file: 
      - .env
    depends_on:
      database_handler:
        condition: service_healthy
      ai_service:
        condition: service_started

  ai_service:
    image: gitlab.dit.htwk-leipzig.de:5050/softwareprojekt/stellenboerse:ai_service
    ports: 
      - "4040"
    env_file: 
      - .env
    depends_on:
      database_handler:
        condition: service_healthy
      validation:
        condition: service_started

  scheduler_service:
    image: gitlab.dit.htwk-leipzig.de:5050/softwareprojekt/stellenboerse:schedulerService
    ports: 
      - "4050"
    env_file: 
      - .env
    depends_on:
      database_handler:
        condition: service_healthy
      mysql:
        condition: service_healthy
      web_agent:
        condition: service_started
      ai_service:
        condition: service_started
      validation:
        condition: service_started
      nginx:
        condition: service_healthy
  
  validation_website:
    image: gitlab.dit.htwk-leipzig.de:5050/softwareprojekt/stellenboerse:validationWebsite
    ports:
      - "3010"
    env_file:
      - .env
    depends_on:
      database_handler:
        condition: service_healthy
      validation:
        condition: service_started

  mysql:
    ports:
      - "3306:3306"
    image: mysql:latest
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql-data:

networks:
  default:
    external: true
    name: stellenboerse_network