stages:
  - build-test

build_frontend_test:
  stage: build-test
  image: node:21
  script:
    - echo "Building Frontend"
    - cd Source/DCNMJobPortal/Frontend
    - npm ci --omit=dev
    - CI=false npm run build
  rules: 
    - if: $CI_COMMIT_BRANCH == "main"
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
  tags:
    - image

build_validation_website_test:
  stage: build-test
  image: node:21
  script:
    - echo "Building ValidationWebsite"
    - cd Source/DCNMJobPortal/ValidationWebsite
    - npm install
    - CI=false npm run build
  rules: 
    - if: $CI_COMMIT_BRANCH == "main"
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
  tags:
    - image

