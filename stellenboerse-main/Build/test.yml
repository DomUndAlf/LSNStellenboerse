stages:
  - test

test_Frontend:
  stage: test
  image: node:21
  script:
    - cd Source/DCNMJobPortal/Frontend
    - npm install
    - npm test -- -u
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always

