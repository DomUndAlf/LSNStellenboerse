stages:
  - build

build_frontend:
  stage: build
  image: node:21
  script:
    - echo "Building Frontend"
    - cd Source/DCNMJobPortal/Frontend
    - npm ci --omit=dev
    - CI=false npm run build
    - cd build/static/js
    - sed -i 's|http://localhost:4010/api/jobs|http://141.57.11.6/api/jobs|g' main*.js
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  artifacts:
    paths:
      - Source/DCNMJobPortal/Frontend/build
  # tags:
  #   - image

build_validation_website:
  stage: build
  image: node:21
  script:
    - echo "Building Validation Website"
    - cd Source/DCNMJobPortal/ValidationWebsite
    - npm install
    - CI=false npm run build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  artifacts:
    paths:
      - Source/DCNMJobPortal/ValidationWebsite/build
  # tags:
  #   - image

build_ai_service:
  stage: build
  image: node:21
  script:
    - cd Source/DCNMJobPortal/AI_Service
    - npm ci --omit=dev
    - npx tsc
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
